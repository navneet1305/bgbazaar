<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
    <meta name="description" content="BG BAZAAR Checkout - Secure payment and pickup from BGBAZAAR Office.">
    <meta name="theme-color" content="#0797a8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BG BAZAAR | Secure Checkout</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="BG BAZAAR home">
        <img id="siteLogo" alt="BG BAZAAR logo" src="assets/bg-bazaar-logo.jpeg">
        <span id="siteName">BG BAZAAR</span>
      </a>
      <nav aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="cart.html">Cart <span id="navCartCount">0</span></a>
        <a href="checkout.html" aria-current="page">Checkout</a>
        <a href="admin.html">Admin Portal</a>
      </nav>
    </header>

    <main>
       <section class="page-hero pickup-hero">
         <p class="eyebrow">Campus Checkout</p>
         <h1>Complete Your Order</h1>
         <p class="page-hero-copy">Complete your payment securely and collect your order from BGBAZAAR Office.</p>
       </section>

        <section class="section checkout-grid">
          <div>
            <div class="section-heading">
              <div>
                <p class="eyebrow">Pickup Information</p>
                <h2>Your Details</h2>
              </div>
            </div>
            <div id="checkoutCartSummary" class="mini-summary" aria-live="polite"></div>
            <form id="paymentForm" class="form-stack">
              <label>
                Full Name
                <input name="buyerName" type="text" autocomplete="name" required>
              </label>
              <label>
                Mobile Number
                <input name="phone" type="tel" autocomplete="tel" pattern="[0-9+\-\s]{8,15}" required>
              </label>
              <label>
                Email Address
                <input name="email" type="email" autocomplete="email" required>
              </label>
              <label>
                Delivery Point Address
                <input id="location" name="location" type="text" value="BGBAZAAR Office" readonly aria-readonly="true">
              </label>
              <label>
                Transaction ID / UTR
                <input name="utrNumber" type="text" placeholder="Enter UTR from your payment confirmation" required>
              </label>
              <label>
                Payment Proof
                <input name="paymentProof" type="file" accept=".jpg,.jpeg,.png,.webp,.pdf,image/jpeg,image/png,image/webp,application/pdf" required>
                <small class="file-hint">JPG, PNG, WebP up to 12 MB, or PDF up to 1.5 MB.</small>
              </label>
              <button class="primary-btn" type="submit" id="submitOrderBtn">Submit Order</button>
            </form>
            <p id="checkoutMessage" class="message" role="status"></p>

          </div>

         <aside class="payment-panel" aria-label="Payment information">
           <h3>Payment Details</h3>
           <div class="total-row">
             <span>Order Total</span>
             <strong id="paymentAmount">Rs. 0</strong>
           </div>
           <div class="payment-options">
             <div class="payment-box">
               <p>Scan to Pay</p>
               <img id="upiQr" alt="Payment QR code">
               <strong id="upiLabel">payments@bgbazaar</strong>
             </div>
             <div id="secondaryPaymentBox" class="payment-box hidden">
               <p>Alternate QR</p>
               <img id="secondaryUpiQr" alt="Alternate payment QR code">
               <strong id="secondaryUpiLabel"></strong>
             </div>
           </div>
           <a class="secondary-link light full-link" href="cart.html">Edit Cart</a>
         </aside>
       </section>
     </main>

     <script src="app.js" type="module"></script>
   </body>
</html>
