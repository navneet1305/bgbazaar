<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Under Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
    overflow:hidden;
    color:#fff;
}

/* Animated Background */
body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#3b82f6;
    border-radius:50%;
    filter:blur(180px);
    top:-150px;
    left:-150px;
    animation:move1 10s infinite alternate;
}

body::after{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    background:#8b5cf6;
    border-radius:50%;
    filter:blur(180px);
    bottom:-150px;
    right:-150px;
    animation:move2 12s infinite alternate;
}

@keyframes move1{
    to{
        transform:translate(150px,120px);
    }
}

@keyframes move2{
    to{
        transform:translate(-120px,-100px);
    }
}

.container{
    position:relative;
    z-index:10;
    width:90%;
    max-width:650px;
    padding:50px;
    text-align:center;
    border-radius:25px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.icon{
    font-size:80px;
    margin-bottom:20px;
    animation:rotate 5s linear infinite;
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

h1{
    font-size:42px;
    margin-bottom:15px;
}

p{
    color:#d1d5db;
    line-height:1.8;
    margin-bottom:30px;
}

.progress{
    width:100%;
    height:10px;
    background:rgba(255,255,255,.15);
    border-radius:30px;
    overflow:hidden;
}

.progress span{
    display:block;
    width:70%;
    height:100%;
    border-radius:30px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6,#8b5cf6);
    animation:loading 2s infinite;
}

@keyframes loading{
    0%{
        margin-left:-70%;
    }
    100%{
        margin-left:100%;
    }
}

.info{
    margin-top:25px;
    font-size:15px;
    color:#9ca3af;
}

.button{
    display:inline-block;
    margin-top:30px;
    padding:14px 35px;
    border-radius:50px;
    text-decoration:none;
    color:#fff;
    background:linear-gradient(45deg,#3b82f6,#8b5cf6);
    transition:.3s;
}

.button:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 25px rgba(59,130,246,.5);
}

footer{
    margin-top:35px;
    color:#6b7280;
    font-size:14px;
}

@media(max-width:600px){

.container{
    padding:35px 25px;
}

.icon{
    font-size:60px;
}

h1{
    font-size:30px;
}

}
</style>

</head>
<body>

<div class="container">

<div class="icon">⚙️</div>

<h1>We're Under Maintenance</h1>

<p>
Our website is currently undergoing scheduled maintenance to improve
your experience. We'll be back online shortly.
</p>

<div class="progress">
<span></span>
</div>

<div class="info">
Estimated completion: Soon...
</div>

<a href="#" class="button">Refresh Page</a>

<footer>
© 2026 Your Company. All Rights Reserved.
</footer>

</div>

<script>
document.querySelector(".button").onclick = function(e){
    e.preventDefault();
    location.reload();
}
</script>

</body>
</html>
